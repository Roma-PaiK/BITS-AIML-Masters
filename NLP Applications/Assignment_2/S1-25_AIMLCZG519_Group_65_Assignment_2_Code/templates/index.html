<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Sentiment Analysis Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            margin: 0;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 95%;
            max-width: 950px;
            margin: 50px 0;
            padding: 40px;
            border-radius: 20px;
            background: rgba(17, 24, 39, 0.75);
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            margin-bottom: 35px;
            font-weight: 600;
            font-size: 32px;
            letter-spacing: 1px;
        }

        textarea {
            width: 100%;
            height: 130px;
            padding: 18px;
            border-radius: 14px;
            border: none;
            font-size: 16px;
            resize: none;
            background: #0f172a;
            color: white;
            box-shadow: inset 0 0 0 1px #334155;
            transition: 0.3s;
        }

        textarea:focus {
            outline: none;
            box-shadow: 0 0 0 2px #6366f1;
        }

        .upload-box {
            margin-top: 20px;
            border: 2px dashed #6366f1;
            padding: 15px;
            border-radius: 14px;
            text-align: center;
            transition: 0.3s;
        }

        .upload-box:hover {
            background: rgba(99, 102, 241, 0.1);
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(99, 102, 241, 0.6);
        }

        .result-card {
            margin-top: 35px;
            padding: 30px;
            border-radius: 18px;
            background: rgba(30, 41, 59, 0.9);
            border-left: 10px solid;
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.5);
        }

        .sentiment {
            font-size: 30px;
            font-weight: 600;
        }

        .emoji {
            font-size: 55px;
        }

        .confidence {
            margin-top: 20px;
            font-size: 18px;
        }

        .bar {
            height: 12px;
            background: #334155;
            border-radius: 12px;
            margin-top: 10px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 12px;
            transition: width 0.8s ease;
        }

        .user-text {
            background: #0f172a;
            padding: 18px;
            border-radius: 14px;
            margin-top: 20px;
            line-height: 1.6;
            box-shadow: inset 0 0 0 1px #334155;
        }

        canvas {
            margin-top: 35px;
        }

        /* Dynamic Colors */
        .text-Positive {
            color: #22c55e;
        }

        .bg-Positive {
            background: linear-gradient(90deg, #22c55e, #16a34a);
        }

        .text-Negative {
            color: #ef4444;
        }

        .bg-Negative {
            background: linear-gradient(90deg, #ef4444, #dc2626);
        }

        .text-Neutral {
            color: #eab308;
        }

        .bg-Neutral {
            background: linear-gradient(90deg, #eab308, #ca8a04);
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>AI Sentiment Analysis Dashboard</h1>

        <form method="POST" enctype="multipart/form-data">
            <textarea name="text" placeholder="Enter customer feedback...">{{ result.text if result }}</textarea>

            <div class="upload-box">
                <label for="file-upload" style="cursor:pointer;font-weight:600;color:#6366f1;">
                    Upload a Text File (.txt)
                </label>
                <input id="file-upload" name="file" type="file" accept=".txt" style="display:block;margin:10px auto;">
            </div>

            <button type="submit">Analyze Sentiment</button>
        </form>

        {% if result %}

        <div class="result-card"
            style="border-left-color:
    {% if result.label == 'positive' %}#22c55e{% elif result.label == 'negative' %}#ef4444{% else %}#eab308{% endif %};">

            <div style="display:flex;justify-content:space-between;align-items:center;">
                <div class="sentiment text-{{ result.label | capitalize }}">
                    {{ result.label | capitalize }}
                </div>
                <div class="emoji">{{ result.emoji }}</div>
            </div>

            <div class="confidence">
                Confidence: <strong>{{ result.confidence }}%</strong>
                <div class="bar">
                    <div class="bar-fill bg-{{ result.label | capitalize }}" style="width:{{ result.confidence }}%">
                    </div>
                </div>
            </div>

            <p style="margin-top:20px;">{{ result.message }}</p>

            <div class="user-text">
                <b>Analyzed Text:</b><br>
                {{ result.text }}
            </div>

            <canvas id="chart"></canvas>

        </div>

        <script>
            var ctx = document.getElementById('chart').getContext('2d');

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Positive', 'Neutral', 'Negative'],
                    datasets: [{    
                            data: [
                                {{ result.scores[2] }},
                                {{ result.scores[1] }},
                                {{ result.scores[0] }}
                            ],
                            backgroundColor: [
                                '#22c55e',
                                '#eab308',
                                '#ef4444'
                        ],
                        borderRadius: 10
                    }]
                },
                options: {
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: "#1e293b",
                        titleColor: "#fff",
                        bodyColor: "#fff"
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        grid: { color: "rgba(255,255,255,0.05)" },
                        ticks: { color: "white" }
                    },
                    x: {
                        grid: { display: false },
                        ticks: { color: "white" }
                    }
                }
            }
});
        </script>

        {% endif %}

    </div>
</body>

</html>
